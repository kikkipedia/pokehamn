<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pokehamn map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.css">
  <script src="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([55.68001,12.58980], 14); //copenhagen coordinates

L.tileLayer('https://a.basemaps.cartocdn.com/light_all/15/16516/11966.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

L.tileLayer('https://kikkipedia.github.io/pokehamn/tiles/{z}/{x}/{y}.png', {
  minZoom: 8,
  maxZoom: 18,
  opacity: 1,
  tms: false,
  updateWhenIdle: true,
  keepBuffer: 2
}).addTo(map);

// GPS tracking
let userMarker;
let userCircle;
let currentPosition = null;
let followUser = true;

L.control.locate({
  position: 'topright',
  flyTo: true,
  keepCurrentZoomLevel: false,
  initialZoomLevel: 17,
  clickBehavior: {
    inView: 'setView',
    outOfView: 'setView',
    inViewNotFollowing: 'setView'
  },
  locateOptions: {
    watch: true,
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  },
  strings: {
    title: 'Show me where I am'
  }
}).addTo(map);

map.on('locationerror', e => {
  alert('GPS error: ' + e.message);
});
</script>
</body>
</html>
