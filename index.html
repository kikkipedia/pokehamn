<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pokehamn map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
const map = L.map('map').setView([57.7089, 11.9746], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.tileLayer('https://kikkipedia.github.io/pokehamn/tiles/{z}/{x}/{y}.png', {
  minZoom: 8,
  maxZoom: 18,
  opacity: 0.75,
  tms: false
}).addTo(map);

// GPS tracking
map.locate({
  watch: true,
  enableHighAccuracy: true
});

let marker, circle;

map.on('locationfound', e => {
  if (!marker) {
    marker = L.marker(e.latlng).addTo(map);
    circle = L.circle(e.latlng, { radius: e.accuracy }).addTo(map);
    map.setView(e.latlng, 17);
  } else {
    marker.setLatLng(e.latlng);
    circle.setLatLng(e.latlng);
    circle.setRadius(e.accuracy);
  }
});

map.on('locationerror', e => {
  alert('GPS error: ' + e.message);
});
</script>
</body>
</html>
